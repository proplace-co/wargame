<!DOCTYPE html>
<html lang="fr">

<style>

.conviction-text { font-size: var(--text-body-size); line-height: var(--text-line-height); color: var(--text-body-color); }

.meta-block { padding: 0 25px 25px; border-bottom: 1px solid #e2e8f0; margin-bottom: 15px; }

.sb-top-data { padding: 0 0 15px 0; display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 0; }
.sb-tag { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-weight: 600; font-size: 0.85em; color: #475569; }
.sb-score, .score-green { background: #16a34a !important; color: white !important; padding: 2px 6px; border-radius: 4px; font-weight: 700; font-size: 0.85em; }
.contact-row { display: flex; flex-direction: column; gap: 5px; font-size: 0.9em; margin-top: 0; }
.nav-item { display: block; padding: 8px 25px; color: #475569; font-weight: 600; font-size: 0.9em; border-left: 4px solid transparent; margin-bottom: 2px; word-break: normal; hyphens: auto; transition: all 0.2s; }
.nav-item:hover { color: #0f172a; border-left-color: #94a3b8; }
.bg-yellow { background: var(--yellow-menu); } .bg-yellow:hover { background: #fef08a !important; }
.bg-green { background: var(--green-menu); } .bg-green:hover { background: #bbf7d0 !important; }
.bg-grey { background: var(--grey-menu); } .bg-grey:hover { background: #e2e8f0 !important; }
.bg-blue { background: var(--blue-menu); } .bg-blue:hover { background: #bfdbfe !important; }
.bg-light-purple { background: #f3e8ff; } .bg-light-purple:hover { background: #e9d5ff !important; }
.battlefield-legend { margin-bottom: 20px; padding: 15px; background: #f8fafc; border-radius: 6px; font-size: 0.9em; }

.battlefield-container { width: 100%; max-width: 100%; overflow-x: auto; display: block; padding-bottom: 15px; -webkit-overflow-scrolling: touch; }

.stage-header { font-size: 0.85em; font-weight: 700; text-transform: uppercase; color: #64748b; text-align: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; min-height: 40px; }
.actor-card { background: #fff; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 0.9em; border-left-width: 4px; margin-bottom: 8px; transition: all 0.2s; }
.border-hunter { border-left-color: #dc2626 !important; }
.border-hunted { border-left-color: #ca8a04 !important; }
.border-fortress { border-left-color: #2563eb !important; }
.border-opportunistic { border-left-color: #16a34a !important; }
.border-distressed { border-left-color: #9333ea !important; }
.actor-card summary { padding: 10px; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; align-items: center; background: #fff; }
.actor-card summary::after { content: "+"; font-size: 1.2em; color: #94a3b8; }
.actor-card[open] summary::after { content: "−"; color: #1e293b; }
.actor-summary-content { display: flex; flex-direction: column; gap: 2px; width: 90%; }
.actor-name { font-weight: 800; color: #0f172a; font-size: 1em; }
.actor-meta { font-size: 0.8em; color: #64748b; display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.label-tier { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-weight: 600; font-size: 0.85em; color: #475569; white-space: nowrap; border: 1px solid #e2e8f0; }
.actor-body { padding: 12px; border-top: 1px solid #f1f5f9; background: #fafafa; overflow-wrap: break-word; }
.ws-box { background: #fffbeb; border: 1px solid #fcd34d; padding: 8px; border-radius: 6px; margin: 10px 0; font-size: 0.85em; color: #92400e; }
.ws-box ul { padding-left: 20px; margin: 0; }
.ws-box li { margin-bottom: 5px; }
.swot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
.swot-grid-small { display: grid; grid-template-columns: 1fr; gap: 6px; margin-top: 10px; }
.swot-item h3 { margin-top: 0; font-size: 1.2em; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; margin-bottom: 10px; color: #000000; }
.swot-item ul { padding-left: 20px; margin: 0; }
.swot-item li { margin-bottom: 8px; }
.sg-box { padding: 6px; border-radius: 4px; font-size: 0.8em; line-height: 1.3; }
.sg-box ul { padding-left: 20px; margin: 5px 0 0 0; }
.sg-box li { margin-bottom: 4px; }
.s-green { background: #dcfce7; color: #14532d; border: 1px solid #bbf7d0; }
.s-red { background: #fee2e2; color: #7f1d1d; border: 1px solid #fecaca; }
.s-blue { background: #dbeafe; color: #1e3a8a; border: 1px solid #bfdbfe; }
.s-orange { background: #ffedd5; color: #9a3412; border: 1px solid #fdba74; }
.strat-inv-box { background: #f3e8ff; border: 1px solid #e9d5ff; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.85em; color: #6b21a8; }
.actor-grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; font-size: 0.85em; }
.actor-grid-info div { display: flex; flex-direction: column; }
.actor-grid-info strong { font-size: 0.9em; color: #64748b; margin-bottom: 2px; }
.label-diff { background: #e2e8f0; color: #1e293b; padding: 2px 6px; border-radius: 4px; font-weight: 700; width: fit-content; border: 1px solid #cbd5e1; }
.label-posture-card { padding: 2px 6px; border-radius: 4px; font-weight: 700; color: #fff; width: fit-content; }
.bg-hunter { background: #dc2626; }
.bg-hunted { background: #ca8a04; }
.bg-fortress { background: #2563eb; }
.bg-opportunistic { background: #16a34a; }
.bg-distressed { background: #9333ea; }
.competitor-block { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #e2e8f0; }
.competitor-block strong { color: #1e293b; font-size: 1.05em; }
details.scenario-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }

details.scenario-card summary::-webkit-details-marker { display: none; }
.scen-summary-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }

details.scenario-card[open] summary .scen-summary-top::before { transform: rotate(90deg); color: #1e293b; }
.scen-logic-grid { display: inline-flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.logic-tag { display: inline-block; font-size: 0.75em; background: #f1f5f9; padding: 3px 10px; border-radius: 12px; border: 1px solid #cbd5e1; color: #475569; font-weight: 600; }
.scen-details-body { padding: 20px; border-top: 1px solid #f1f5f9; background: #fcfcfc; }
.table-container { width: 100%; max-width: 100%; overflow-x: auto; display: block; -webkit-overflow-scrolling: touch; margin-bottom: 20px; }
.synergies-table { width: 100%; border-collapse: collapse; font-size: 0.9em; min-width: 1000px; }
.synergies-table th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #cbd5e1; white-space: nowrap; }
.synergies-table td { padding: 12px; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
.synergies-table th:nth-child(2), .synergies-table td:nth-child(2) { width: 40%; min-width: 350px; white-space: normal; }
.section { margin: 0 25px 24px; }
.section h3 { font-size: 15px; font-weight: 700; margin: 0 0 8px 0; border: none; padding: 0; color: #000000; }
.meta-text { font-size: 12px; color: #94A3B8; margin-bottom: 16px; font-style: italic; }
.meta-desc { font-size: 13px; color: #64748B; margin: 0 0 16px 0; line-height: 1.5; }
.divider { height: 1px; background-color: #E2E8F0; margin: 24px 25px; }
.cta-list { list-style: none; padding: 0; margin: 0 0 16px 0; }
.cta-list li { font-size: 13px; color: #475569; margin-bottom: 12px; padding-left: 20px; position: relative; line-height: 1.4; }
.cta-list li::before { content: "→"; position: absolute; left: 0; color: #3B82F6; font-weight: bold; }
.cta-list strong { color: #1E293B; }
.btn { display: block; width: 100%; padding: 10px 14px; font-size: 14px; font-weight: 600; text-align: center; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; box-sizing: border-box; margin-bottom: 10px; white-space: normal; line-height: 1.4; }
.btn-secondary { background-color: #F8FAFC; color: #0F172A; border: 1px solid #E2E8F0; }
.btn-secondary:hover { background-color: #E2E8F0; text-decoration: none; border-color: #CBD5E1; }
.btn-primary { background-color: #1E293B; color: #FFFFFF; border: none; }
.btn-primary:hover { background-color: #0F172A; text-decoration: none; }
.btn-status { display: block; width: 100%; padding: 8px; font-size: 13px; font-weight: 700; border-radius: 4px; text-decoration: none; cursor: pointer; text-align: center; color: #ffffff; margin-bottom: 6px; box-sizing: border-box; transition: all 0.2s; border: none; }
.status-call { background-color: #16a34a; }
.status-call:hover { background-color: #15803d; }

.status-pass:hover { background: #dc2626; }

  .img-col { position: static; width: 100%; margin-top: 20px; max-height: none; }
  .actor-card { width: 100% !important; }
  .table-container { display: block; overflow-x: auto; }
  .synergies-table { min-width: 700px; }
  .swot-grid { grid-template-columns: 1fr; }
}
</style>
