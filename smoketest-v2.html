<script id="memo-scrollspy">(function(){
var items=document.querySelectorAll('.sidebar .nav-item[href^="#"]');
if(!items.length||!('IntersectionObserver' in window))return;
var map={};items.forEach(function(a){var id=(a.getAttribute('href')||'').slice(1);if(id)map[id]=a;});
var current=null;
var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){
if(!e.isIntersecting)return;var a=map[e.target.id];if(!a||a===current)return;
if(current)current.classList.remove('is-active');a.classList.add('is-active');current=a;});},
{rootMargin:'-15% 0px -70% 0px'});
Object.keys(map).forEach(function(id){var el=document.getElementById(id);if(el)obs.observe(el);});
})();</script>
<script src="https://proplace-co.github.io/wargame/proplace-chat-memo.js"></script>
